<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Le Monde</title>
</head>
<body>
  <table id="t" border="1"></table>
  <script>
    fetch("leMonde.csv")
      .then(r => r.text())
      .then(text => {
        const rows = text.trim().split("\n").map(line =>
          line.match(/("([^"]|"")*"|[^,]*)(,|$)/g)
            .slice(0, -1)
            .map(c => c.replace(/,$/, "").replace(/^"|"$/g, "").replace(/""/g, '"'))
        );
        document.getElementById("t").innerHTML = rows.map((cells, i) =>
          "<tr>" + cells.map(c => `<${i ? "td" : "th"}>${c}</${i ? "td" : "th"}>`).join("") + "</tr>"
        ).join("");
      });
  </script>
</body>
</html>
